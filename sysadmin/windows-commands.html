<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Windows CMD & PowerShell Commands | MKTech Terminal Docs</title>

<meta name="description" content="Complete Windows CMD and PowerShell command reference for system administrators including syntax, examples and use cases.">

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Plus Jakarta Sans',sans-serif;
transition:all .3s;
}

.terminal-font{
font-family:'Fira Code',monospace;
}

/* THEMES */

.theme-cmd{
--bg:#050505;
--card:#121212;
--text:#e0e0e0;
--accent:#3b82f6;
--header:#000;
--dim:#666;
}

.theme-ps{
--bg:#011627;
--card:#0b253a;
--text:#ffffff;
--accent:#10b981;
--header:#010d18;
--dim:#8892b0;
}

.custom-theme{
background:var(--bg);
color:var(--text);
}

.custom-card{
background:var(--card);
border:1px solid rgba(255,255,255,.05);
}

.category-pill{
background:linear-gradient(90deg,var(--accent),transparent);
}

</style>

</head>



<body class="theme-cmd custom-theme min-h-screen">



<!-- GLOBAL HEADER -->
<div id="header"></div>



<!-- TERMINAL TOOL HEADER -->

<header class="sticky top-0 z-40 bg-black/60 backdrop-blur-xl border-b border-white/5 shadow-2xl">

<div class="max-w-[1600px] mx-auto px-8 py-6 flex flex-wrap justify-between items-center gap-6">

<div class="flex items-center gap-4">

<div class="bg-blue-600 px-3 py-1 rounded font-black text-white text-2xl">
MK
</div>

<div>
<h1 class="text-xl font-extrabold tracking-tighter uppercase">
Terminal <span class="text-blue-500">Pro</span>
</h1>

<span class="text-[10px] text-gray-500 font-bold tracking-[0.2em]">
SYSTEM ADMINISTRATION v2.0
</span>
</div>

</div>



<!-- MODE SWITCH -->

<div class="flex items-center bg-white/5 p-1.5 rounded-2xl border border-white/10">

<button onclick="switchMode('cmd')" id="btn-cmd"
class="px-8 py-2.5 rounded-xl text-xs font-black transition-all bg-blue-600 text-white shadow-lg">

CMD.EXE

</button>

<button onclick="switchMode('ps')" id="btn-ps"
class="px-8 py-2.5 rounded-xl text-xs font-black transition-all text-white/40 hover:text-white">

POWERSHELL

</button>

</div>



<!-- SEARCH -->

<div class="relative w-full md:w-96">

<input
type="text"
id="search"
placeholder="Search commands, syntax, or keywords..."
class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">

</div>

</div>

</header>



<!-- PAGE CONTENT -->

<main id="main-content"
class="max-w-[1600px] mx-auto px-8 py-16">

</main>



<script>

let currentMode="cmd"



function switchMode(mode){

currentMode=mode

document.body.classList.remove("theme-cmd","theme-ps")

document.body.classList.add(mode==="cmd"?"theme-cmd":"theme-ps")

const btnCmd=document.getElementById("btn-cmd")
const btnPs=document.getElementById("btn-ps")

if(mode==="cmd"){

btnCmd.className="px-8 py-2.5 rounded-xl text-xs font-black bg-blue-600 text-white shadow-lg"
btnPs.className="px-8 py-2.5 rounded-xl text-xs font-black text-white/40 hover:text-white"

}else{

btnPs.className="px-8 py-2.5 rounded-xl text-xs font-black bg-emerald-500 text-white shadow-lg"
btnCmd.className="px-8 py-2.5 rounded-xl text-xs font-black text-white/40 hover:text-white"

}

render()

}



function render(){

const query=document.getElementById("search").value.toLowerCase()

const container=document.getElementById("main-content")

container.innerHTML=""



const filtered=commandData.filter(i=>

i.type===currentMode &&

(i.cmd.toLowerCase().includes(query) ||

i.desc.toLowerCase().includes(query) ||

i.cat.toLowerCase().includes(query))

)



const categories=[...new Set(filtered.map(i=>i.cat))]



categories.forEach(cat=>{

const section=document.createElement("section")

section.className="mb-16"



section.innerHTML=`

<div class="flex items-center gap-4 mb-8">

<div class="h-8 w-1 category-pill rounded-full"></div>

<h2 class="text-2xl font-black uppercase tracking-tight">
${cat}
</h2>

</div>

<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">

${filtered.filter(i=>i.cat===cat).map(i=>`

<div class="custom-card rounded-3xl p-8 hover:scale-[1.02] hover:border-blue-500/40 transition-all shadow-2xl shadow-black/50">

<div class="flex justify-between items-start mb-6">

<h3 class="terminal-font text-2xl font-bold text-blue-400">${i.cmd}</h3>

<span class="text-[10px] font-bold text-gray-600 border border-white/5 px-2 py-1 rounded">
STABLE
</span>

</div>

<p class="text-sm text-gray-400 mb-6 leading-relaxed">
${i.desc}
</p>

<div class="space-y-4">

<div class="bg-black/40 p-4 rounded-xl border border-white/5">

<label class="text-[9px] font-black text-blue-500 uppercase tracking-widest block mb-2">
Syntax
</label>

<code class="terminal-font text-xs text-gray-300">
${i.syn}
</code>

</div>

<div class="bg-blue-500/5 p-4 rounded-xl border border-blue-500/10">

<label class="text-[9px] font-black text-emerald-500 uppercase tracking-widest block mb-2">
Example
</label>

<code class="terminal-font text-xs text-emerald-400">
${i.ex}
</code>

</div>

</div>

</div>

`).join("")}

</div>
`

container.appendChild(section)

})

}



document.getElementById("search").addEventListener("input",render)

window.onload=render

</script>



<script src="/js/include.js"></script>

<script>
loadComponent("header","/components/header.html")
</script>
