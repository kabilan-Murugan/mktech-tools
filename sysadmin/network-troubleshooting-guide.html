<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>MKTech | Network Diagnostic Suite</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap"
    rel="stylesheet">

  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: all .4s ease;
    }

    .terminal-font {
      font-family: 'Fira Code', monospace;
    }

    .theme-cmd {
      --bg: #030303;
      --card: #0f0f0f;
      --text: #d1d1d1;
      --accent: #2563eb;
      --code: #4ade80;
    }

    .theme-ps {
      --bg: #011627;
      --card: #0b253a;
      --text: #ffffff;
      --accent: #10b981;
      --code: #f0db4f;
    }

    .custom-theme {
      background: var(--bg);
      color: var(--text);
    }

    .custom-card {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, .05);
    }

    .sidebar {
      background: rgba(0, 0, 0, .3);
      border-right: 1px solid rgba(255, 255, 255, .05);
    }

    .terminal-window {
      background: #000;
      border-radius: 12px;
      border: 1px solid #333;
      overflow: hidden;
    }

    .terminal-header {
      background: #222;
      padding: 8px 12px;
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
  </style>
</head>



<body class="theme-cmd custom-theme min-h-screen">

  <!-- STANDARD MKTECH HEADER -->
  <div id="header"></div>



  <div class="max-w-[1800px] mx-auto flex flex-col lg:flex-row gap-8 px-8 py-10">

    <!-- SIDEBAR -->

    <aside class="w-full lg:w-64 space-y-2">

      <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4">
        Jump To Stage
      </p>

      <button
        class="w-full text-left px-4 py-3 rounded-xl bg-white/5 border border-white/5 hover:border-blue-500/50 transition-all">
        <span class="text-xs font-bold block">01. Identification</span>
        <span class="text-[10px] text-gray-500 uppercase">IP & Host Info</span>
      </button>

      <button
        class="w-full text-left px-4 py-3 rounded-xl bg-white/5 border border-white/5 hover:border-blue-500/50 transition-all">
        <span class="text-xs font-bold block">02. Connectivity</span>
        <span class="text-[10px] text-gray-500 uppercase">Ping & Trace</span>
      </button>

      <button
        class="w-full text-left px-4 py-3 rounded-xl bg-white/5 border border-white/5 hover:border-blue-500/50 transition-all">
        <span class="text-xs font-bold block">03. DNS Analysis</span>
        <span class="text-[10px] text-gray-500 uppercase">Lookup & Flush</span>
      </button>

    </aside>



    <!-- MAIN CONTENT -->

    <main id="grid-container" class="flex-grow grid grid-cols-1 xl:grid-cols-2 gap-8"></main>

  </div>



  <script>

    const tools = [

      {
        type: "cmd",
        cat: "01. Identification",
        cmd: "ipconfig /all",
        desc: "Retrieves complete network interface details including MAC address and DHCP lease.",
        syn: "ipconfig /all",
        ex: "ipconfig /all > network_report.txt",
        preview: `Windows IP Configuration
Ethernet adapter Ethernet
IPv4 Address : 192.168.1.15
Subnet Mask  : 255.255.255.0`
      },

      {
        type: "cmd",
        cat: "02. Connectivity",
        cmd: "ping -t 8.8.8.8",
        desc: "Continuously checks connectivity with Google DNS.",
        syn: "ping -t <target>",
        ex: "ping -t 8.8.8.8",
        preview: `Reply from 8.8.8.8
time=12ms
TTL=117`
      },

      {
        type: "cmd",
        cat: "02. Connectivity",
        cmd: "tracert google.com",
        desc: "Displays route packets take to reach the destination.",
        syn: "tracert <hostname>",
        ex: "tracert google.com",
        preview: `Tracing route to google.com
1 192.168.1.1
2 10.0.0.1
3 142.250.190.46`
      },

      {
        type: "cmd",
        cat: "03. DNS Analysis",
        cmd: "nslookup google.com",
        desc: "Checks DNS resolution of domain names.",
        syn: "nslookup <domain>",
        ex: "nslookup google.com",
        preview: `Server: dns.google
Address: 8.8.8.8
Name: google.com`
      },

      {
        type: "ps",
        cat: "01. Identification",
        cmd: "Get-NetIPConfiguration",
        desc: "PowerShell network adapter configuration command.",
        syn: "Get-NetIPConfiguration",
        ex: "Get-NetIPConfiguration | Select InterfaceAlias,IPv4Address",
        preview: `InterfaceAlias : Ethernet
IPv4Address : 10.0.0.5`
      }

    ]

    let mode = "cmd"

    function switchMode(newMode) {

      mode = newMode

      document.body.className = `theme-${mode} custom-theme min-h-screen`

      render()

    }

    function render() {

      const container = document.getElementById("grid-container")
      container.innerHTML = ""

      tools.filter(t => t.type === mode).forEach(t => {

        const card = document.createElement("div")

        card.className = "custom-card rounded-3xl p-8 flex flex-col gap-6 hover:border-blue-500/30 transition-all"

        card.innerHTML = `

<div class="flex justify-between items-start">

<div>
<span class="text-[10px] font-black text-blue-500 uppercase tracking-widest">${t.cat}</span>
<h3 class="terminal-font text-2xl font-bold mt-2 text-white">${t.cmd}</h3>
</div>

<button onclick="navigator.clipboard.writeText('${t.cmd}')"
class="p-3 bg-white/5 rounded-xl hover:bg-blue-600 transition-all">
📋
</button>

</div>

<p class="text-sm text-gray-400">${t.desc}</p>

<div class="grid grid-cols-1 md:grid-cols-2 gap-4">

<div class="bg-black/50 p-4 rounded-xl border border-white/5">
<label class="text-[9px] font-bold text-gray-500 uppercase block mb-1">
Syntax
</label>
<code class="terminal-font text-xs text-blue-400">${t.syn}</code>
</div>

<div class="bg-black/50 p-4 rounded-xl border border-white/5">
<label class="text-[9px] font-bold text-gray-500 uppercase block mb-1">
Example
</label>
<code class="terminal-font text-xs text-emerald-400">${t.ex}</code>
</div>

</div>

<div class="terminal-window">

<div class="terminal-header">
<div class="dot bg-red-500/50"></div>
<div class="dot bg-yellow-500/50"></div>
<div class="dot bg-green-500/50"></div>
<span class="text-[9px] text-gray-600 ml-2 uppercase">Preview</span>
</div>

<div class="p-4 terminal-font text-[11px] text-gray-500 whitespace-pre">
${t.preview}
</div>

</div>
`

        container.appendChild(card)

      })

    }

    window.onload = render

  </script>



  <script src="/js/include.js"></script>

  <script>
    loadComponent("header", "/components/header.html")
  </script>

</body>

</html>
