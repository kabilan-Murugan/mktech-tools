<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>URL Encoder & Decoder | MKTech Tools</title>

<meta name="description" content="Encode or decode URLs and query parameters using the MKTech URL Studio RFC 3986 compliant encoder.">

<script src="https://cdn.tailwindcss.com"></script>

</head>



<body class="bg-slate-950 text-slate-200">

<!-- HEADER -->
<div id="header"></div>



<!-- PAGE WRAPPER -->
<div class="max-w-6xl mx-auto px-6 py-24 flex justify-center">

<div class="bg-slate-900 shadow-2xl rounded-3xl p-8 w-full max-w-4xl border border-slate-800 relative overflow-hidden">

<!-- Glow -->
<div class="absolute -bottom-24 -right-24 w-64 h-64 bg-cyan-600/10 blur-[100px] rounded-full"></div>



<header class="flex justify-between items-center mb-8">

<div>
<h1 class="text-3xl font-extrabold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
URL Studio
</h1>

<p class="text-slate-500 text-sm font-medium">
RFC 3986 Compliant Encoder
</p>
</div>

<label class="flex items-center gap-2 text-[10px] font-bold uppercase text-slate-500">
<input type="checkbox" id="liveMode" checked class="accent-cyan-500">
Live Mode
</label>

</header>



<div class="grid md:grid-cols-2 gap-6">

<!-- INPUT -->

<div class="space-y-2">

<span class="text-[10px] font-bold uppercase tracking-widest text-slate-500 ml-1">
Input String / URL
</span>

<textarea
id="urlInput"
class="w-full bg-slate-950 border border-slate-700 rounded-2xl p-4 h-40 text-slate-300 font-mono text-sm focus:ring-2 focus:ring-cyan-500 outline-none resize-none shadow-inner"
placeholder="https://example.com/search?q=mk tech tools"
oninput="handleLive()">

</textarea>

</div>



<!-- OUTPUT -->

<div class="space-y-2">

<div class="flex justify-between items-center">

<span class="text-[10px] font-bold uppercase tracking-widest text-slate-500 ml-1">
Processed Result
</span>

<button onclick="copyURL()" class="text-[10px] text-cyan-400 font-bold hover:underline">
Copy
</button>

</div>

<textarea
id="urlOutput"
readonly
class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl p-4 h-40 text-cyan-400 font-mono text-sm outline-none resize-none"
placeholder="Output...">

</textarea>

</div>

</div>



<!-- PARAMETERS -->

<div id="paramBox" class="mt-6 bg-slate-950/50 border border-slate-800 rounded-2xl p-4 hidden">

<h3 class="text-[10px] font-bold text-slate-500 uppercase mb-3 tracking-widest">
Query Parameters Detected
</h3>

<div id="paramList" class="grid grid-cols-1 md:grid-cols-2 gap-2"></div>

</div>



<!-- ACTIONS -->

<footer class="mt-8 pt-6 border-t border-slate-800/50 flex flex-wrap gap-3">

<button onclick="runURL('encode')"
class="bg-cyan-600 hover:bg-cyan-500 text-white px-6 py-2.5 rounded-xl font-bold text-xs shadow-lg">

Encode Component

</button>

<button onclick="runURL('decode')"
class="bg-slate-700 hover:bg-slate-600 text-white px-6 py-2.5 rounded-xl font-bold text-xs">

Decode Component

</button>

<button onclick="clearAll()"
class="ml-auto text-xs text-slate-500 hover:text-red-400 font-bold">

Clear All

</button>


<div class="flex justify-center gap-6 text-sm text-slate-400">

<a href="/pages/about.html">About</a>

<a href="/pages/contact.html">Contact</a>

<a href="/pages/privacy-policy.html">Privacy Policy</a>

</div>

</footer>



</div>
</div>



<script>

const input=document.getElementById("urlInput")
const output=document.getElementById("urlOutput")



function handleLive(){

if(document.getElementById("liveMode").checked){
runURL("encode")
}

analyzeParams()

}



function runURL(type){

const val=input.value.trim()

if(!val){
output.value=""
return
}

try{

output.value=(type==="encode")
? encodeURIComponent(val)
: decodeURIComponent(val)

output.classList.remove("text-red-400")

}

catch(e){

output.value="⚠️ Error: Invalid Encoding Format"

output.classList.add("text-red-400")

}

}



function analyzeParams(){

const val=input.value

const paramBox=document.getElementById("paramBox")

const paramList=document.getElementById("paramList")

try{

const url=new URL(val.startsWith("http")?val:"https://"+val)

const params=new URLSearchParams(url.search)

if([...params].length>0){

paramBox.classList.remove("hidden")

paramList.innerHTML=""

params.forEach((v,k)=>{

paramList.innerHTML+=`
<div class="flex items-center gap-2 bg-slate-900 border border-slate-800 p-2 rounded-lg text-[11px]">
<span class="text-cyan-500 font-bold">${k}:</span>
<span class="text-slate-400 truncate">${v}</span>
</div>
`

})

}

else{

paramBox.classList.add("hidden")

}

}

catch(e){

paramBox.classList.add("hidden")

}

}



function clearAll(){

input.value=""
output.value=""
document.getElementById("paramBox").classList.add("hidden")

}



async function copyURL(){

if(!output.value) return

await navigator.clipboard.writeText(output.value)

alert("URL Copied!")

}

</script>



<script src="/js/include.js"></script>

<script>
loadComponent("header","/components/header.html")
</script>



</body>
</html>
