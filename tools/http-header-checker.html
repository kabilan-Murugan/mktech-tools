<style>

body{
font-family:'Fira Code',monospace;
background:#020617;
color:#38bdf8;
}

.glow-border{
border:1px solid #0ea5e9;
box-shadow:0 0 15px rgba(14,165,233,0.2);
}

.header-key{
color:#7dd3fc;
font-weight:bold;
}

.header-val{
color:#f0f9ff;

}

font-size:10px;
padding:2px 6px;
border-radius:4px;
text-transform:uppercase;
}

</style>

<body>

<!-- HEADER -->
<div id="header"></div>


<!-- PAGE WRAPPER -->
<div class="max-w-6xl mx-auto px-6 py-24">

<div class="flex justify-center">

<div class="glow-border bg-slate-950/90 p-6 w-full max-w-3xl border-t-4">

<!-- HEADER INFO -->
<div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 border-b border-sky-900/50 pb-4">

<div>
<h1 class="text-lg font-bold tracking-widest text-sky-400">
>> HTTP_HEADER_SNIFFER.sys
</h1>

<p class="text-[10px] text-sky-700">
MODULE: INFRASTRUCTURE_ENUMERATION
</p>
</div>

<div id="security-status" class="hidden flex gap-2">
<span class="security-badge bg-sky-900 text-sky-300">
Target Captured
</span>
</div>

</div>



<!-- URL INPUT -->

<div class="relative group mb-6">

<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="text-sky-600 font-bold">$</span>
</div>

<input id="url"
type="text"
placeholder="https://target-server.com"
class="w-full bg-slate-900 border border-sky-900 py-3 pl-8 pr-28 text-sm focus:outline-none focus:border-sky-400 placeholder-sky-900 text-sky-200">

<button onclick="checkHeaders()"
class="absolute right-2 top-1.5 bg-sky-600 hover:bg-sky-400 text-slate-950 font-black px-4 py-1.5 text-[10px] uppercase">

Sniff_Headers

</button>

</div>



<!-- OUTPUT TERMINAL -->

<div class="bg-black/50 border border-sky-900 p-4 h-80 overflow-y-auto">

<div id="output" class="text-[11px] leading-relaxed">

<span class="text-sky-900 italic">
SYSTEM_IDLE: Awaiting transmission instructions...
</span>

</div>

</div>



<!-- META INFO -->

<div class="mt-4 flex justify-between text-[9px] text-sky-900 uppercase tracking-widest">

<span>
Protocol: HTTPS/TLS_1.3
</span>

<span>
MKTech Sniffer v5.2
</span>

</div>

</div>

</div>

</div>



<script>

async function checkHeaders(){

const urlInput=document.getElementById("url").value

const output=document.getElementById("output")

const status=document.getElementById("security-status")

if(!urlInput)return

output.innerHTML=`<span class="animate-pulse text-sky-500">[!] INITIATING PACKET CAPTURE ON ${urlInput}...</span>`

status.classList.add("hidden")

try{

const response=await fetch(
"https://api.allorigins.win/raw?url="+encodeURIComponent(urlInput)
)

let resultHTML=`<div class="mb-4 text-sky-700 border-b border-sky-900/30 pb-2">
CAPTURE_COMPLETE: ${response.status} ${response.statusText}
</div>`

for(let [key,value] of response.headers.entries()){

let highlight=""

if(["server","x-powered-by","via"].includes(key.toLowerCase())){
highlight="bg-sky-900/30 text-yellow-500 px-1"
}

resultHTML+=`<div class="flex py-0.5">
<span class="header-key w-1/3 shrink-0 uppercase ${highlight}">${key}:</span>
<span class="header-val break-all ml-2">${value}</span>
</div>`

}

output.innerHTML=resultHTML

status.classList.remove("hidden")

}catch{

output.innerHTML=`<span class="text-red-500 font-bold">[CRITICAL_ERROR] CONNECTION_REFUSED</span>
<br>
<span class="text-red-900 text-[10px]">REASON: SSL_HANDSHAKE_FAILED OR CORS_BLOCK</span>`

}

}

</script>
