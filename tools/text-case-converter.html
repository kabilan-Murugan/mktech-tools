<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Text Case Converter | MKTech Tools</title>

<meta name="description" content="Convert text to uppercase, lowercase, camelCase, snake_case, kebab-case and more using MKTech Text Forge.">

<script src="https://cdn.tailwindcss.com"></script>

</head>



<body class="bg-slate-950 text-slate-200">

<!-- HEADER -->
<div id="header"></div>



<!-- PAGE WRAPPER -->
<div class="max-w-6xl mx-auto px-6 py-24 flex justify-center">



<div class="bg-slate-900 shadow-2xl rounded-3xl p-8 w-full max-w-4xl border border-slate-800 relative overflow-hidden">

<!-- Glow -->
<div class="absolute -top-24 -left-24 w-64 h-64 bg-pink-600/10 blur-[100px] rounded-full"></div>



<header class="flex justify-between items-center mb-8">

<div>
<h1 class="text-3xl font-extrabold bg-gradient-to-r from-pink-400 to-rose-500 bg-clip-text text-transparent">
Text Forge
</h1>

<p class="text-slate-500 text-sm font-medium">
Advanced Case & Format Utility
</p>
</div>

<div class="text-right flex gap-4 text-[10px] font-mono text-slate-500 uppercase">

<span>
Chars:
<span id="charCount" class="text-pink-400">0</span>
</span>

<span>
Words:
<span id="wordCount" class="text-pink-400">0</span>
</span>

</div>

</header>



<div class="grid md:grid-cols-2 gap-6">


<!-- INPUT -->

<div class="space-y-2">

<span class="text-[10px] font-bold uppercase tracking-widest text-slate-500 ml-1">
Input Text
</span>

<textarea
id="inputText"
class="w-full bg-slate-950 border border-slate-700 rounded-2xl p-4 h-64 text-slate-300 font-mono text-sm focus:ring-2 focus:ring-pink-500 outline-none resize-none shadow-inner"
placeholder="Type or paste text here..."
oninput="updateStats()">

</textarea>

</div>



<!-- CONTROLS -->

<div class="flex flex-col gap-2">

<span class="text-[10px] font-bold uppercase tracking-widest text-slate-500 ml-1">
Standard Transforms
</span>

<div class="grid grid-cols-2 gap-2">

<button onclick="transform('upper')" class="bg-slate-800 hover:bg-pink-600 py-2 rounded-lg text-xs font-bold">
UPPERCASE
</button>

<button onclick="transform('lower')" class="bg-slate-800 hover:bg-pink-600 py-2 rounded-lg text-xs font-bold">
lowercase
</button>

<button onclick="transform('title')" class="bg-slate-800 hover:bg-pink-600 py-2 rounded-lg text-xs font-bold">
Title Case
</button>

<button onclick="transform('sentence')" class="bg-slate-800 hover:bg-pink-600 py-2 rounded-lg text-xs font-bold">
Sentence
</button>

</div>



<span class="text-[10px] font-bold uppercase tracking-widest text-slate-500 mt-4 ml-1">
Developer Cases
</span>

<div class="grid grid-cols-2 gap-2">

<button onclick="transform('camel')" class="bg-slate-800 hover:bg-indigo-600 py-2 rounded-lg text-xs font-bold">
camelCase
</button>

<button onclick="transform('snake')" class="bg-slate-800 hover:bg-indigo-600 py-2 rounded-lg text-xs font-bold">
snake_case
</button>

<button onclick="transform('kebab')" class="bg-slate-800 hover:bg-indigo-600 py-2 rounded-lg text-xs font-bold">
kebab-case
</button>

<button onclick="transform('reverse')" class="bg-slate-800 hover:bg-orange-600 py-2 rounded-lg text-xs font-bold">
Reverse
</button>

</div>



<div class="mt-auto pt-4 flex gap-2">

<button onclick="copyOutput()" class="flex-1 bg-pink-600 hover:bg-pink-500 py-3 rounded-xl font-bold text-sm">
Copy Result
</button>

<button onclick="clearText()" class="px-4 bg-slate-700 hover:bg-red-600 rounded-xl">
🗑️
</button>

</div>

</div>

</div>



<!-- OUTPUT -->

<div class="mt-6">

<div class="bg-slate-950/50 border border-slate-800 rounded-2xl p-4 min-h-[80px]">

<p id="outputText"
class="text-sm font-mono text-slate-400 break-words leading-relaxed italic">

Result preview will appear here...

</p>

</div>

</div>



</div>
</div>



<script>

const input=document.getElementById("inputText")
const output=document.getElementById("outputText")

function updateStats(){

const val=input.value.trim()

document.getElementById("charCount").innerText=input.value.length

document.getElementById("wordCount").innerText=
val?val.split(/\s+/).length:0

}



function transform(type){

let text=input.value

if(!text) return

let result=""

switch(type){

case"upper":
result=text.toUpperCase()
break

case"lower":
result=text.toLowerCase()
break

case"sentence":
result=text.charAt(0).toUpperCase()+text.slice(1).toLowerCase()
break

case"title":
result=text.replace(/\w\S*/g,t=>t.charAt(0).toUpperCase()+t.substr(1).toLowerCase())
break

case"camel":
result=text.toLowerCase().replace(/[^a-zA-Z0-9]+(.)/g,(m,chr)=>chr.toUpperCase())
break

case"snake":
result=text.match(/[A-Z]?[a-z]+|[0-9]+/g).map(x=>x.toLowerCase()).join("_")
break

case"kebab":
result=text.match(/[A-Z]?[a-z]+|[0-9]+/g).map(x=>x.toLowerCase()).join("-")
break

case"reverse":
result=text.split("").reverse().join("")
break

}

output.innerText=result
output.classList.remove("italic","text-slate-400")
output.classList.add("text-pink-400")

}



function clearText(){

input.value=""
output.innerText="Result preview will appear here..."
output.classList.add("italic","text-slate-400")

updateStats()

}



async function copyOutput(){

const text=output.innerText

if(text.includes("preview")) return

await navigator.clipboard.writeText(text)

alert("Text Copied!")

}

</script>



<script src="/js/include.js"></script>

<script>
loadComponent("header","/components/header.html")
</script>



</body>
</html>
