<body>

<!-- HEADER -->
<div id="header"></div>



<!-- PAGE WRAPPER -->
<div class="max-w-6xl mx-auto px-6 py-24">

<div class="flex justify-center">

<div class="cyber-box w-full max-w-2xl p-8 rounded-lg">

<div class="flex justify-between items-center mb-6">

<h1 class="text-xl font-bold text-orange-400 tracking-tighter">
>> IP_GEOLOCATION_TRACE
</h1>

<button onclick="getMyIP()"
class="text-[10px] border border-orange-500/50 px-2 py-1 hover:bg-orange-500/10">

DETECT_MY_IP

</button>

</div>



<div class="flex gap-2 mb-6">

<input id="ip"
class="cyber-input flex-1 p-3"
placeholder="TARGET_IP (e.g. 8.8.8.8)">

<button onclick="lookupIP()"
id="traceBtn"
class="cyber-btn px-6 py-3 text-black font-black">

TRACE_IP

</button>

</div>



<div id="loading"
class="hidden mb-4 text-xs animate-pulse text-orange-500">

[PROCESS] INTERCEPTING_PACKET_HEADERS...

</div>



<div id="result-grid"
class="hidden grid grid-cols-1 md:grid-cols-2 gap-4 border-t border-orange-900/30 pt-6">

<div class="bg-black/40 p-3 border border-orange-900/20">

<p class="data-label">
Network_Address
</p>

<p id="res-ip" class="data-value font-bold"></p>

</div>



<div class="bg-black/40 p-3 border border-orange-900/20">

<p class="data-label">
Service_Provider
</p>

<p id="res-isp" class="data-value truncate"></p>

</div>



<div class="bg-black/40 p-3 border border-orange-900/20">

<p class="data-label">
Location
</p>

<p id="res-location" class="data-value"></p>

</div>



<div class="bg-black/40 p-3 border border-orange-900/20">

<p class="data-label">
Timezone
</p>

<p id="res-tz" class="data-value"></p>

</div>



<div class="bg-black/40 p-3 border border-orange-900/20 md:col-span-2 flex justify-between items-center">

<div>

<p class="data-label">
Coordinates
</p>

<p id="res-coords" class="data-value"></p>

</div>

<a id="res-map"
target="_blank"
class="map-link hidden">

OPEN_SATELLITE_VIEW

</a>

</div>

</div>



<div id="error"
class="hidden text-red-500 text-center p-4 border border-red-900/30 bg-red-900/10 mt-4">

[ERROR] TRACE_FAILED: INVALID_IP_OR_API_LIMIT

</div>

</div>

</div>

</div>



<script>

async function lookupIP(){

const ip=document.getElementById("ip").value.trim()

const grid=document.getElementById("result-grid")

const loading=document.getElementById("loading")

const error=document.getElementById("error")

const btn=document.getElementById("traceBtn")

if(!ip){
alert("TARGET_REQUIRED")
return
}

btn.disabled=true

grid.classList.add("hidden")

error.classList.add("hidden")

loading.classList.remove("hidden")

try{

const response=await fetch(`https://ip-api.com/json/${ip}`)

const data=await response.json()

if(data.status==="fail") throw new Error()

document.getElementById("res-ip").innerText=data.query

document.getElementById("res-isp").innerText=data.isp||"UNKNOWN_ISP"

document.getElementById("res-location").innerText=`${data.city}, ${data.regionName}, ${data.country}`

document.getElementById("res-tz").innerText=data.timezone

document.getElementById("res-coords").innerText=`${data.lat}, ${data.lon}`

const mapLink=document.getElementById("res-map")

mapLink.href=`https://www.google.com/maps?q=${data.lat},${data.lon}`

mapLink.classList.remove("hidden")

loading.classList.add("hidden")

grid.classList.remove("hidden")

}catch{

loading.classList.add("hidden")

error.classList.remove("hidden")

}

btn.disabled=false

}



async function getMyIP(){

try{

const res=await fetch("https://api.ipify.org?format=json")

const data=await res.json()

document.getElementById("ip").value=data.ip

lookupIP()

}catch{

alert("COULD_NOT_DETECT_IP")

}

}

</script>
