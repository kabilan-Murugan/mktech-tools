<script>

async function loadIP(){

const ipDisplay=document.getElementById("ip")

const providers=[

{
url:"https://demo.ip-api.com/json/?fields=66846719",
map:(d)=>({ip:d.query,city:d.city,reg:d.regionName,country:d.country,isp:d.isp,tz:d.timezone,lat:d.lat,lon:d.lon})
},

{
url:"https://ipapi.co/json/",
map:(d)=>({ip:d.ip,city:d.city,reg:d.region,country:d.country_name,isp:d.org,tz:d.timezone,lat:d.latitude,lon:d.longitude})
}

]

for(let provider of providers){

try{

const response=await fetch(provider.url)

if(!response.ok) throw new Error()

const rawData=await response.json()

const data=provider.map(rawData)

ipDisplay.innerText=data.ip

document.getElementById("location").innerText=`${data.city||'Unknown'}, ${data.reg||''}`

document.getElementById("country").innerText=data.country||"-"

document.getElementById("isp").innerText=data.isp||"-"

document.getElementById("timezone").innerText=data.tz||"-"

if(data.lat && data.lon){
document.getElementById("mapBtn").href=`https://www.google.com/maps?q=${data.lat},${data.lon}`
}

return

}catch{}

}

ipDisplay.innerText="Connection Error"

}



async function copyIP(){

const ipText=document.getElementById("ip").innerText

if(ipText.includes(".")){

await navigator.clipboard.writeText(ipText)

const ipDisplay=document.getElementById("ip")

const original=ipDisplay.innerText

ipDisplay.innerText="Copied!"

ipDisplay.style.color="#4ade80"

setTimeout(()=>{
ipDisplay.innerText=original
ipDisplay.style.color=""
},1000)

}

}

loadIP()

</script>
