<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>WHOIS Lookup Tool | MKTech OSINT</title>

<meta name="description" content="Lookup WHOIS domain registration information including registrar, creation date, expiration and domain status using MKTech OSINT profiler.">

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Fira Code',monospace;
background:#020202;
background-image:
linear-gradient(0deg,transparent 24%,rgba(0,255,65,.05) 25%,rgba(0,255,65,.05) 26%,transparent 27%,transparent 74%,rgba(0,255,65,.05) 75%,rgba(0,255,65,.05) 76%,transparent 77%,transparent),
linear-gradient(90deg,transparent 24%,rgba(0,255,65,.05) 25%,rgba(0,255,65,.05) 26%,transparent 27%,transparent 74%,rgba(0,255,65,.05) 75%,rgba(0,255,65,.05) 76%,transparent 77%,transparent);
background-size:50px 50px;
color:#00ff41;
}

.dossier-card{
background:rgba(0,0,0,.9);
border:1px solid #00ff41;
box-shadow:0 0 20px rgba(0,255,65,.1), inset 0 0 10px rgba(0,255,65,.05);
}

.data-label{
color:#008f11;
font-size:10px;
text-transform:uppercase;
letter-spacing:1px;
}

.data-value{
color:#00ff41;
margin-bottom:1rem;
border-bottom:1px solid #002200;
padding-bottom:4px;
}

.scanning-text::after{
content:'...';
animation:dots 1.5s steps(5,end) infinite;
}

@keyframes dots{
0%,20%{content:'.'}
40%{content:'..'}
60%{content:'...'}
80%,100%{content:''}
}

@keyframes scan{
from{transform:translateY(-100%)}
to{transform:translateY(1000%)}
}

</style>

</head>



<body>

<!-- HEADER -->
<div id="header"></div>



<!-- PAGE WRAPPER -->
<div class="max-w-6xl mx-auto px-6 py-24 flex justify-center">



<div class="dossier-card p-8 w-full max-w-2xl relative">



<!-- HEADER -->

<div class="flex justify-between items-start mb-8 border-l-4 border-green-500 pl-4">

<div>
<h1 class="text-xl font-bold tracking-tighter uppercase">
Subject_Profile: [WHOIS]
</h1>

<p class="text-[10px] text-green-800">
MKTECH INTEL DOMAIN ENUMERATION v3.1
</p>
</div>

<div class="text-right text-[10px] text-green-900 leading-none">
AUTH: ADMIN<br>
CLASS: UNRESTRICTED<br>
LOC: 127.0.0.1
</div>

</div>



<!-- INPUT -->

<div class="flex gap-2 mb-10">

<input
id="domain"
type="text"
placeholder="TARGET_DOMAIN.COM"
class="flex-1 bg-black border border-green-900 p-3 text-sm focus:outline-none focus:border-green-400 text-green-400 placeholder-green-900">

<button
onclick="lookupWhois()"
class="bg-green-900 hover:bg-green-500 hover:text-black text-green-500 px-6 font-bold text-xs uppercase transition-all">

Analyze

</button>

</div>



<!-- OUTPUT -->

<div id="output-container" class="space-y-4 min-h-[300px]">

<div
class="text-center py-20 text-green-900 text-sm italic scanning-text"
id="status-msg">

Waiting for target input

</div>

<div
id="profile-data"
class="hidden grid grid-cols-1 md:grid-cols-2 gap-x-8">

</div>

</div>



<!-- SCANLINE -->

<div class="absolute inset-0 pointer-events-none overflow-hidden opacity-10">

<div class="w-full h-1 bg-green-500 animate-[scan_4s_linear_infinite]"></div>

</div>



</div>
</div>



<script>

async function lookupWhois(){

const domain=document.getElementById("domain").value

const statusMsg=document.getElementById("status-msg")

const profileData=document.getElementById("profile-data")

if(!domain) return

profileData.classList.add("hidden")

statusMsg.classList.remove("hidden")

statusMsg.innerHTML=`DECRYPTING DATA FOR ${domain.toUpperCase()}`

statusMsg.className="text-center py-20 text-green-500 animate-pulse scanning-text"

try{

const response=await fetch(`https://rdap.org/domain/${domain}`)

const data=await response.json()

let registrar=data.entities
? data.entities[0].vcardArray[1][1][3]
: "N/A"

let created=data.events
? data.events.find(e=>e.eventAction==="registration")?.eventDate
: "N/A"

let expires=data.events
? data.events.find(e=>e.eventAction==="expiration")?.eventDate
: "N/A"

const fields=[

{label:"Domain Handle",value:data.handle||domain},

{label:"Registrar Entity",value:registrar},

{label:"Registry Created",value:created?new Date(created).toLocaleDateString():"N/A"},

{label:"Registry Expiry",value:expires?new Date(expires).toLocaleDateString():"N/A"},

{label:"Status",value:data.status?data.status[0].toUpperCase():"ACTIVE"},

{label:"Secure DNS",value:data.secureDNS?"ENABLED":"DISABLED"}

]

statusMsg.classList.add("hidden")

profileData.classList.remove("hidden")

profileData.innerHTML=fields.map(f=>`
<div>
<div class="data-label">${f.label}</div>
<div class="data-value">${f.value}</div>
</div>
`).join("")

}

catch(err){

statusMsg.innerHTML="[!] ACCESS_DENIED: DATA_STREAM_INTERRUPTED"

statusMsg.className="text-center py-20 text-red-600 font-bold"

}

}

</script>



<script src="/js/include.js"></script>

<script>
loadComponent("header","/components/header.html")
</script>



</body>
</html>
