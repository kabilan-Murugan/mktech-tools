<meta charset="UTF-8">

<meta name="google-adsense-account" content="ca-pub-xxxxxxxxxxxx">

<style>

@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap');

}

<body class="text-slate-200">

<!-- HEADER -->
<div id="header"></div>



<!-- PAGE WRAPPER -->
<div class="max-w-6xl mx-auto px-6 py-24 flex justify-center">

<main class="w-full max-w-md">

<div class="glass-card shadow-2xl rounded-3xl p-8 relative overflow-hidden">

<div class="absolute -top-24 -right-24 w-48 h-48 bg-blue-500/10 blur-[80px] rounded-full"></div>

<header class="text-center mb-10">

<h1 class="text-4xl font-extrabold bg-gradient-to-br from-white via-blue-200 to-blue-500 bg-clip-text text-transparent">
MKTech Gen
</h1>

<p class="text-slate-400 text-sm mt-2">
Enterprise-Grade Security Utility
</p>

</header>



<!-- PASSWORD OUTPUT -->

<div class="mb-8">

<input id="password"
type="text"
readonly
placeholder="Security Key"
class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-5 py-5 text-2xl mono text-blue-400 text-center tracking-wider"/>

<div class="flex justify-center mt-3">

<button onclick="copyPassword()"
class="bg-slate-800 hover:bg-slate-700 text-xs font-bold uppercase tracking-widest px-6 py-2 rounded-full border border-slate-700">

<span id="copyText">Copy to Clipboard</span>

</button>

</div>

</div>



<!-- STRENGTH METER -->

<div class="mb-10 bg-slate-900/40 p-4 rounded-2xl border border-slate-800">

<div class="flex justify-between text-[10px] mb-3 uppercase tracking-widest font-bold">

<span class="text-slate-500">Integrity Level</span>

<span id="strengthLabel" class="text-blue-400">Awaiting...</span>

</div>

<div class="h-1.5 bg-slate-800 rounded-full overflow-hidden">

<div id="strengthBar"
class="h-full bg-blue-500 transition-all duration-700 w-0"></div>

</div>

</div>



<!-- CONTROLS -->

<div class="space-y-8">

<div>

<div class="flex justify-between mb-4">

<label class="text-xs font-bold uppercase tracking-widest text-slate-400">
Character Length
</label>

<span id="lengthValue" class="text-2xl font-black text-blue-400 mono">
16
</span>

</div>

<input type="range"
min="8"
max="64"
value="16"
id="lengthSlider"
class="w-full"/>

</div>



<div class="grid grid-cols-2 gap-y-4 gap-x-6">

<label class="flex items-center gap-3">
<input type="checkbox" id="uppercase" checked>
<span class="text-sm">Uppercase</span>
</label>

<label class="flex items-center gap-3">
<input type="checkbox" id="lowercase" checked>
<span class="text-sm">Lowercase</span>
</label>

<label class="flex items-center gap-3">
<input type="checkbox" id="numbers" checked>
<span class="text-sm">Numbers</span>
</label>

<label class="flex items-center gap-3">
<input type="checkbox" id="symbols">
<span class="text-sm">Symbols</span>
</label>

</div>



<button onclick="generatePassword()"
class="w-full glow-button bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-5 rounded-2xl uppercase tracking-widest">

Generate Secure Key

</button>

</div>

</div>

</main>

</div>



<script>

const slider=document.getElementById("lengthSlider")
const lengthValue=document.getElementById("lengthValue")
const passwordInput=document.getElementById("password")
const strengthBar=document.getElementById("strengthBar")
const strengthLabel=document.getElementById("strengthLabel")
const copyBtnText=document.getElementById("copyText")

const charSets={
uppercase:"ABCDEFGHIJKLMNOPQRSTUVWXYZ",
lowercase:"abcdefghijklmnopqrstuvwxyz",
numbers:"0123456789",
symbols:"!@#$%^&*()_+-=[]{}|;:,.<>?"
}

slider.oninput=()=>{
lengthValue.innerText=slider.value
generatePassword()
}

document.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
cb.onchange=()=>generatePassword()
})

function generatePassword(){

let charset=""

if(uppercase.checked) charset+=charSets.uppercase
if(lowercase.checked) charset+=charSets.lowercase
if(numbers.checked) charset+=charSets.numbers
if(symbols.checked) charset+=charSets.symbols

if(!charset){
passwordInput.value=""
return
}

let password=""
const array=new Uint32Array(parseInt(slider.value))

crypto.getRandomValues(array)

for(let i=0;i<array.length;i++){
password+=charset[array[i] % charset.length]
}

passwordInput.value=password

calculateStrength(password)

}

async function copyPassword(){

if(!passwordInput.value) return

await navigator.clipboard.writeText(passwordInput.value)

copyBtnText.innerText="Copied!"

setTimeout(()=>copyBtnText.innerText="Copy to Clipboard",2000)

}

function calculateStrength(pass){

let score=0

if(pass.length>12) score++
if(pass.length>20) score++
if(/[A-Z]/.test(pass) && /[a-z]/.test(pass)) score++
if(/[0-9]/.test(pass) && /[^A-Za-z0-9]/.test(pass)) score+=2

score=Math.min(score,4)

const colors=["#ef4444","#f97316","#3b82f6","#8b5cf6","#10b981"]
const labels=["Unsafe","Weak","Standard","Elite","Bulletproof"]

strengthBar.style.width=(score+1)*20+"%"
strengthBar.style.backgroundColor=colors[score]
strengthLabel.innerText=labels[score]
strengthLabel.style.color=colors[score]

}

generatePassword()

</script>
