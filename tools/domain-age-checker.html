<script>

async function checkDomainAge(){

const domain=document.getElementById("domain").value.trim().toLowerCase()

const resultContainer=document.getElementById("result-container")
const loading=document.getElementById("loading")
const error=document.getElementById("error")

if(!domain){
alert("INPUT_REQUIRED")
return
}

resultContainer.classList.add("hidden")
error.classList.add("hidden")
loading.classList.remove("hidden")

try{

const response=await fetch(`https://rdap.org/domain/${domain}`)

if(!response.ok) throw new Error("DOMAIN_NOT_FOUND")

const data=await response.json()

const events=data.events||[]

const registration=events.find(e=>e.eventAction==="registration")?.eventDate
const expiration=events.find(e=>e.eventAction==="expiration")?.eventDate

const createdDate=new Date(registration)
const expiryDate=new Date(expiration)

const today=new Date()

const ageMs=today-createdDate
const totalLifeMs=expiryDate-createdDate

const ageYears=(ageMs/(1000*60*60*24*365.25)).toFixed(1)

const daysLeft=Math.ceil((expiryDate-today)/(1000*60*60*24))

const lifePercent=Math.min(100,Math.max(0,(ageMs/totalLifeMs)*100))

document.getElementById("res-domain").innerText=domain.toUpperCase()

document.getElementById("res-registrar").innerText=
data.entities?.[0]?.vcardArray?.[1]?.[1]?.[3] || "PRIVATE_REGISTRAR"

document.getElementById("res-created").innerText="BORN: "+createdDate.toLocaleDateString()

document.getElementById("res-expires").innerText="END: "+expiryDate.toLocaleDateString()

document.getElementById("res-age").innerText=ageYears+" YEARS OLD"

document.getElementById("res-days-left").innerText=daysLeft+" DAYS"

document.getElementById("age-bar").style.width=lifePercent+"%"

loading.classList.add("hidden")
resultContainer.classList.remove("hidden")

}catch(err){

loading.classList.add("hidden")
error.classList.remove("hidden")

}

}

</script>
