<script>

let currentMode="encode"

const input=document.getElementById("inputText")
const output=document.getElementById("outputText")
const stats=document.getElementById("stats")
const modeBtn=document.getElementById("modeBtn")

function encodeBase64(str){
return btoa(unescape(encodeURIComponent(str)))
}

function decodeBase64(str){
return decodeURIComponent(escape(atob(str)))
}

function toggleMode(){

currentMode=currentMode==="encode"?"decode":"encode"

modeBtn.innerText=currentMode==="encode"?"Encode Mode":"Decode Mode"

process()

}

function process(){

const val=input.value.trim()

if(!val){
output.value=""
updateStats(0)
return
}

try{

if(currentMode==="encode"){
output.value=encodeBase64(val)
}else{
output.value=decodeBase64(val)
}

output.classList.remove("text-red-400")
output.classList.add("text-emerald-400")

}catch{

output.value="Invalid Base64 Input"
output.classList.add("text-red-400")

}

updateStats(val.length)

}

function processManually(){
process()
}

function clearAll(){

input.value=""
output.value=""
updateStats(0)

}

function updateStats(len){

const bytes=new Blob([input.value]).size

stats.innerText=`Length: ${len} chars | Size: ${bytes} bytes`

}

async function copyResult(){

if(!output.value)return

await navigator.clipboard.writeText(output.value)

const btn=document.getElementById("copyBtn")

btn.innerText="Copied ✓"

setTimeout(()=>{
btn.innerText="Copy"
},2000)

}

input.addEventListener("input",()=>{

if(document.getElementById("liveToggle").checked){
process()
}

})

updateStats(0)

</script>
